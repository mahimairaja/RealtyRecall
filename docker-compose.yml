# One-command local stack for RealtyRecall

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-app}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432" # exposed for local tools / integration tests
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-app}"]
      interval: 5s
      timeout: 3s
      retries: 10

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-neo4jpassword}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4jdata:/data
    ports:
      - "7474:7474" # Neo4j Browser
      - "7687:7687" # Bolt
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'cypher-shell -u neo4j -p "${NEO4J_PASSWORD:-neo4jpassword}" ''RETURN 1'' >/dev/null 2>&1 || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  backend:
    build: ./backend
    env_file: .env
    environment:
      PORT: 8080
    volumes:
      # Persist Cognee's local artifacts (datasets, cache) across restarts.
      - cogneedata:/app/.cognee_system
      - cogneedata_data:/app/.data
    ports:
      - "8000:8080" # http://localhost:8000  (docs at /docs)
    depends_on:
      db:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  agent:
    build: ./agent
    env_file: .env
    depends_on:
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_TOKEN_ENDPOINT: ${VITE_TOKEN_ENDPOINT:-http://localhost:8000/api/v1/token}
        VITE_AGENT_NAME: ${VITE_AGENT_NAME:-realty}
    ports:
      - "5173:80" # http://localhost:5173
    depends_on:
      - backend

volumes:
  pgdata:
  neo4jdata:
  cogneedata:
  cogneedata_data:
